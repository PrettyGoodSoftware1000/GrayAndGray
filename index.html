<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egg v1</title>
    <style>
        :root {
            --panel-bg: rgba(34, 34, 34, 0.94);
            --panel-border: #555;
            --accent: #0f0;
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: monospace;
            background: #111;
            color: #fff;
        }

        /* The play area fills the whole screen behind everything. */
        #gameCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            image-rendering: pixelated;
        }

        /* Top-left HUD: version, (hideable) controls hint, creature status. */
        #hud {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 50;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid var(--panel-border);
            padding: 8px 12px;
            font-size: 0.85em;
            line-height: 1.6;
            pointer-events: none;
            max-width: 280px;
        }
        #hud b { color: var(--accent); font-size: 1.1em; }
        #controls-hint { color: #aaa; }
        #creature-status { color: var(--accent); font-weight: bold; }

        /* --- Speak to Creature panel: bottom-right, 1/3 height --- */
        #right-panel {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 340px;
            height: 33vh;
            box-sizing: border-box;
            padding: 12px 14px;
            background: var(--panel-bg);
            border-top: 3px solid var(--panel-border);
            border-left: 3px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 40;
            backdrop-filter: blur(2px);
        }

        /* --- Pause panel: full-height on the left, hidden until ESC --- */
        #pause-panel {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 360px;
            box-sizing: border-box;
            padding: 18px 16px;
            background: var(--panel-bg);
            border-right: 3px solid var(--panel-border);
            display: none;            /* hidden by default */
            flex-direction: column;
            gap: 12px;
            z-index: 60;
            backdrop-filter: blur(3px);
        }
        #pause-panel.open { display: flex; }
        #pause-panel h2 { margin: 0; color: #fff; }
        #pause-panel .resume-hint { color: #888; font-size: 0.8em; margin: 0; }
        .settings-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-bottom: 10px;
            border-bottom: 1px solid #444;
        }
        .settings-section label { color: #ccc; font-size: 0.9em; }

        h3 { margin: 2px 0; font-size: 0.95em; color: #ccc; }

        .log {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            background: #1a1a1a;
            padding: 8px;
            border: 1px solid #444;
            font-size: 0.85em;
        }
        .log p { margin: 0 0 4px 0; word-wrap: break-word; }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 9px;
            box-sizing: border-box;
            background: #000;
            color: var(--accent);
            border: 1px solid var(--panel-border);
            flex: 0 0 auto;
            font-family: monospace;
        }

        button {
            background: #2e7d32;
            color: white;
            border: 1px solid #777;
            padding: 9px;
            cursor: pointer;
            font-family: monospace;
            flex: 0 0 auto;
        }
        button:hover { filter: brightness(1.15); }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="hud">
        <b>🥚 Egg v1</b><br>
        <span id="controls-hint">WASD / Arrows to scroll the world &middot; ESC to pause</span>
        <div id="creature-status">Wandering aimlessly.</div>
    </div>

    <!-- Hidden until ESC. When paused it fills the left edge top-to-bottom. -->
    <div id="pause-panel">
        <h2>&#9208; Paused</h2>
        <div class="settings-section">
            <label for="api-key-input">Gemini API Key:</label>
            <input type="password" id="api-key-input" placeholder="AIzaSy...">
            <button id="save-settings-btn">Save &amp; Resume</button>
        </div>
        <h3>Action Log</h3>
        <div id="action-log" class="log"></div>
        <p class="resume-hint">Press ESC again to resume.</p>
    </div>

    <div id="right-panel">
        <h3>Speak to Creature</h3>
        <div id="chat-history" class="log"></div>
        <input type="text" id="command-input" placeholder="Speak to the creature...">
    </div>

    <script src="game.js"></script>
</body>
</html>
