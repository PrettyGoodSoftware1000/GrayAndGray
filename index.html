<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egg v1</title>
    <style>
        :root {
            --panel-bg: rgba(34, 34, 34, 0.94);
            --panel-border: #555;
            --accent: #0f0;
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: monospace;
            background: #111;
            color: #fff;
        }

        /* The play area now fills the whole screen behind everything. */
        #gameCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            image-rendering: pixelated;
            cursor: grab;
        }

        /* Top-left HUD with version + controls hint */
        #hud {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 50;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid var(--panel-border);
            padding: 8px 12px;
            font-size: 0.85em;
            line-height: 1.5;
            pointer-events: none;
        }
        #hud b { color: var(--accent); font-size: 1.1em; }
        #hud span { color: #aaa; }

        /* Side bars: 1/3 of their old (full-height) size, resting on the bottom. */
        .panel {
            position: fixed;
            bottom: 0;
            height: 33vh;
            box-sizing: border-box;
            padding: 12px 14px;
            background: var(--panel-bg);
            border-top: 3px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 40;
            backdrop-filter: blur(2px);
        }
        #left-panel { left: 0; width: 300px; border-right: 3px solid var(--panel-border); }
        #right-panel { right: 0; width: 340px; border-left: 3px solid var(--panel-border); }

        .panel h3 { margin: 2px 0; font-size: 0.95em; color: #ccc; }

        .log {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            background: #1a1a1a;
            padding: 8px;
            border: 1px solid #444;
            font-size: 0.85em;
        }
        .log p { margin: 0 0 4px 0; word-wrap: break-word; }

        #creature-status {
            font-size: 1.05em;
            font-weight: bold;
            color: var(--accent);
            padding: 8px;
            background: #000;
            border: 1px solid var(--panel-border);
            text-align: center;
            flex: 0 0 auto;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 9px;
            box-sizing: border-box;
            background: #000;
            color: var(--accent);
            border: 1px solid var(--panel-border);
            flex: 0 0 auto;
            font-family: monospace;
        }

        button {
            background: #555;
            color: white;
            border: 1px solid #777;
            padding: 9px;
            cursor: pointer;
            font-family: monospace;
            flex: 0 0 auto;
        }
        button:hover { background: #666; }

        /* --- Settings Menu Modal --- */
        #settings-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: #222;
            padding: 30px;
            border: 3px solid var(--panel-border);
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="hud">
        <b>🥚 Egg v1</b><br>
        <span>WASD / Arrows to scroll the world</span>
    </div>

    <div id="left-panel" class="panel">
        <button id="settings-btn">⚙️ Settings (Pause)</button>
        <div id="creature-status">Wandering aimlessly.</div>
        <h3>Action Log</h3>
        <div id="action-log" class="log"></div>
    </div>

    <div id="right-panel" class="panel">
        <h3>Command Creature</h3>
        <div id="chat-history" class="log"></div>
        <input type="text" id="command-input" placeholder="Tell creature what to do...">
    </div>

    <div id="settings-modal">
        <div class="modal-content">
            <h2>Egg v1 — Settings</h2>
            <p style="color: #aaa; font-size: 0.9em;">Game is currently PAUSED.</p>
            <label for="api-key-input">Gemini API Key:</label>
            <input type="password" id="api-key-input" placeholder="AIzaSy...">
            <button id="save-settings-btn" style="background: #2e7d32;">Save &amp; Resume</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
