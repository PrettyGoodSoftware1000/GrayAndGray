<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creature Prompt</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: monospace; background: #222; color: #fff; }
        #left-panel { width: 250px; padding: 20px; background: #333; display: flex; flex-direction: column; gap: 10px; }
        #middle-panel { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #111; }
        #right-panel { width: 300px; padding: 20px; background: #333; display: flex; flex-direction: column; }
        canvas { background: #4CAF50; image-rendering: pixelated; border: 4px solid #555; }
        .log { flex-grow: 1; overflow-y: auto; background: #222; padding: 10px; border: 1px solid #444; }
        #creature-status { font-size: 1.2em; font-weight: bold; color: #0f0; padding: 10px; background: #000; border: 1px solid #555; text-align: center; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; box-sizing: border-box; background: #000; color: #0f0; border: 1px solid #555; }
        
        button { background: #555; color: white; border: 1px solid #777; padding: 10px; cursor: pointer; font-family: monospace; }
        button:hover { background: #666; }

        /* --- Settings Menu Modal --- */
        #settings-modal {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); /* Darkens the game background */
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: #222;
            padding: 30px;
            border: 3px solid #555;
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

    <div id="left-panel">
        <button id="settings-btn">⚙️ Settings (Pause)</button>
        <hr style="width:100%; border-color:#444;">
        <h3>Creature Focus</h3>
        <div id="creature-status">Wandering aimlessly.</div>
        <h3>Action Log</h3>
        <div id="action-log" class="log"></div>
    </div>

    <div id="middle-panel">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
    </div>

    <div id="right-panel">
        <h3>Command Creature</h3>
        <div id="chat-history" class="log"></div>
        <input type="text" id="command-input" placeholder="Tell creature what to do...">
    </div>

    <div id="settings-modal">
        <div class="modal-content">
            <h2>Game Settings</h2>
            <p style="color: #aaa; font-size: 0.9em;">Game is currently PAUSED.</p>
            <label for="api-key-input">Gemini API Key:</label>
            <input type="password" id="api-key-input" placeholder="AIzaSy..."> 
            <button id="save-settings-btn" style="background: #2e7d32;">Save & Resume</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
